<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mon planning membre - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/mon-planning-membre.css">'
    );
  </script>
</head>

<body>

  <div id="burger-menu-container"></div>
  <div id="boite-dialogue-container"></div>
  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">

      <h1 class="site-title">
        Mon planning membre
      </h1>

      <h2 class="site-subtitle">
        Retrouvez ici votre planning La Clé du Parc.
      </h2>

    </section>

    <section class="section-recontact" aria-label="Planning du membre">

      <table class="table" aria-label="Planning membre">

        <thead>
          <tr>
            <th>
              <span id="titre-planning-membre">À venir</span>
            </th>

            <th>
              <a href="#" id="planning-membre-passes" data-affichage="passes">
                Passés
              </a>
            </th>

            <th>
              <button class="button" type="button" id="bouton-nouvelle-date-planning">
                Nouvelle date
              </button>
            </th>
          </tr>
        </thead>

        <tbody id="liste-planning-membre">

          <tr>
            <td colspan="3">
              Chargement de votre planning...
            </td>
          </tr>

          <!--
            Les cartes planning membre seront injectées ici par mon-planning-membre.js.

            Structure prévue pour une carte :

            <tr>
              <td colspan="3">

                <article class="carte-planning-membre">

                  <p>
                    <span class="date-planning-membre">Samedi 15 juin 2026</span>
                    <span class="heure-planning-membre">14h00 - 17h00</span>
                  </p>

                  <p>
                    <span class="parc-planning-membre">Parc de Ménars</span>
                    <span class="departement-planning-membre">(41)</span>
                  </p>

                  <button class="micro-action" type="button">
                    Voir l’adresse
                  </button>

                  <button class="micro-action" type="button">
                    Annuler
                  </button>

                </article>

              </td>
            </tr>
          -->

        </tbody>

      </table>

    </section>

    <section class="exit-menu-bas" aria-label="Retour au compte membre">
      <h2>
        <a href="/PAGES/PRIVEES/MON%20COMPTE%20MEMBRE/mon-compte-membre.html">
          Retour à mon compte membre
        </a>
      </h2>
    </section>

  </main>

  <div id="footer-container"></div>

  <script>
    document.querySelectorAll("a[href^='/']").forEach((lien) => {
      lien.setAttribute("href", window.SITE_BASE + lien.getAttribute("href"));
    });

    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/boite-dialogue.js")
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/burger-menu.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/footer.js"))
      .then(() => chargerScript(window.SITE_BASE + "/PAGES/PRIVEES/MON%20PLANNING%20MEMBRE/mon-planning-membre.js"));
  </script>

</body>
</html>
