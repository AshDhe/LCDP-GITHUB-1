<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mon planning membre - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/mon-planning-membre.css">'
    );
  </script>
</head>

<body>

  <div id="burger-menu-container"></div>
  <div id="boite-dialogue-container"></div>
  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">

      <h1 class="site-title">
        Mon planning membre
      </h1>

      <h2 class="site-subtitle">
        Retrouvez vos demandes et rendez-vous dans les parcs.
      </h2>

    </section>

    <section class="section-recontact" aria-label="Planning du membre">

      <div class="planning-actions-haut">

        <button class="micro-action" type="button" id="bouton-nouvelle-demande-planning">
          Nouvelle demande
        </button>

      </div>

      <div class="planning-filtres">

        <label for="filtre-rendezvous-membre">
          Afficher
        </label>

        <select id="filtre-rendezvous-membre" name="filtre-rendezvous-membre">
          <option value="avenir" selected>
            Rendez-vous à venir
          </option>
          <option value="passes-3-mois">
            Rendez-vous passés des 3 derniers mois
          </option>
        </select>

      </div>

      <div id="message-planning-membre" class="message-page" aria-live="polite">
        Chargement de votre planning...
      </div>

      <section class="liste-rendezvous-membre" id="liste-rendezvous-membre" aria-label="Liste des rendez-vous membre">

        <!--
          Les rendez-vous seront injectés ici par mon-planning-membre.js.

          Structure prévue pour chaque rendez-vous :

          <article class="carte-rendezvous-membre">
            <div class="rendezvous-entete">
              <h3>Nom du parc</h3>
              <span class="rendezvous-statut">Confirmé</span>
            </div>

            <div class="rendezvous-details">
              <p>Date : samedi 15 juin 2026</p>
              <p>Horaire : 14h00 - 17h00</p>
              <p>Type : accès membre</p>
              <p>Participants : 1 membre, 2 invités</p>
            </div>

            <div class="rendezvous-actions">
              <button class="micro-action" type="button">
                Voir le détail
              </button>
            </div>
          </article>
        -->

      </section>

    </section>

    <section class="exit-menu-bas" aria-label="Retour au compte membre">
      <h2>
        <a href="/PAGES/PRIVEES/MON%20COMPTE%20MEMBRE/mon-compte-membre.html">
          Retour à mon compte membre
        </a>
      </h2>
    </section>

  </main>

  <div id="footer-container"></div>

  <script>
    document.querySelectorAll("a[href^='/']").forEach((lien) => {
      lien.setAttribute("href", window.SITE_BASE + lien.getAttribute("href"));
    });

    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/boite-dialogue.js")
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/burger-menu.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/footer.js"))
      .then(() => chargerScript(window.SITE_BASE + "/PAGES/PRIVEES/MON%20PLANNING%20MEMBRE/mon-planning-membre.js"));
  </script>

</body>
</html>
