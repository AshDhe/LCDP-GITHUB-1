<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Planning du parc - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/planning-parc-nouvelle-date.css">'
    );
  </script>
</head>

<body>

  <main class="site-page planning-parc-nouvelle-date-page">

    <section class="planning-parc-entete">

      <h1 id="titre-planning-parc">
        Planning du parc
      </h1>

      <p id="infos-planning-parc">
      </p>

    </section>

    <section class="planning-parc-calendrier" aria-label="Planning d'ouverture du parc">

      <div class="planning-parc-navigation">

        <button class="micro-action" type="button" id="bouton-mois-precedent">
          ←
        </button>

        <h2 id="titre-mois-planning">
        </h2>

        <button class="micro-action" type="button" id="bouton-mois-suivant">
          →
        </button>

      </div>

      <div class="planning-parc-jours-semaine" aria-hidden="true">
        <span>Lun</span>
        <span>Mar</span>
        <span>Mer</span>
        <span>Jeu</span>
        <span>Ven</span>
        <span>Sam</span>
        <span>Dim</span>
      </div>

      <div class="planning-parc-grille" id="grille-planning-parc">
      </div>

    </section>

  </main>

  <script>
    const ENDPOINT_NOUVELLE_DATE_MEMBRE =
      "https://nouvelle-date-membre-api.lacleduparc.fr";

    const params = new URLSearchParams(window.location.search);

    const nomParc = params.get("nom") || "";
    const departement = params.get("dptmt") || "";
    const idParc = params.get("idparc") || "";

    const titrePlanning = document.getElementById("titre-planning-parc");
    const infosPlanning = document.getElementById("infos-planning-parc");
    const titreMois = document.getElementById("titre-mois-planning");
    const grillePlanning = document.getElementById("grille-planning-parc");
    const boutonMoisPrecedent = document.getElementById("bouton-mois-precedent");
    const boutonMoisSuivant = document.getElementById("bouton-mois-suivant");

    const aujourdHui = new Date();
    aujourdHui.setHours(0, 0, 0, 0);

    let moisAffiche = aujourdHui.getMonth();
    let anneeAffichee = aujourdHui.getFullYear();

    if (titrePlanning) {
      titrePlanning.textContent = nomParc ? "Planning du parc de " + nomParc : "Planning du parc";
    }

    if (infosPlanning) {
      infosPlanning.textContent = departement ? "Département " + departement : "";
    }

    if (boutonMoisPrecedent) {
      boutonMoisPrecedent.addEventListener("click", () => {
        moisAffiche -= 1;

        if (moisAffiche < 0) {
          moisAffiche = 11;
          anneeAffichee -= 1;
        }

        afficherMois();
      });
    }

    if (boutonMoisSuivant) {
      boutonMoisSuivant.addEventListener("click", () => {
        moisAffiche += 1;

        if (moisAffiche > 11) {
          moisAffiche = 0;
          anneeAffichee += 1;
        }

        afficherMois();
      });
    }

    function envoyerMessageParent(action) {
      window.parent.postMessage(
        {
          source: "lcdp-planning-parc-nouvelle-date",
          action: action
        },
        "*"
      );
    }

    function masquerBoutonFermerParent() {
      envoyerMessageParent("masquer-fermer-planning");
    }

    function afficherBoutonFermerParent() {
      envoyerMessageParent("afficher-fermer-planning");
    }

    function formaterDateIsoLocale(date) {
      const annee = date.getFullYear();
      const mois = String(date.getMonth() + 1).padStart(2, "0");
      const jour = String(date.getDate()).padStart(2, "0");

      return annee + "-" + mois + "-" + jour;
    }

    async function afficherMois() {
      if (!titreMois || !grillePlanning) return;

      const dateMois = new Date(anneeAffichee, moisAffiche, 1);

      titreMois.textContent = dateMois.toLocaleDateString("fr-FR", {
        month: "long",
        year: "numeric"
      });

      grillePlanning.innerHTML = `
        <div class="jour-planning-message">
          Chargement du planning...
        </div>
      `;

      let planning = [];

      try {
        planning = await chargerPlanningParcMois({
          idparc: idParc,
          annee: anneeAffichee,
          mois: moisAffiche + 1
        });
      } catch (erreur) {
        grillePlanning.innerHTML = `
          <div class="jour-planning-message">
            ${echapperHtml(erreur.message)}
          </div>
        `;
        return;
      }

      const planningParDate = new Map();

      planning.forEach((jour) => {
        planningParDate.set(jour.date, jour);
      });

      const premierJourMois = new Date(anneeAffichee, moisAffiche, 1);
      const dernierJourMois = new Date(anneeAffichee, moisAffiche + 1, 0);

      const nombreJours = dernierJourMois.getDate();
      const decalageDebut = (premierJourMois.getDay() + 6) % 7;

      let html = "";

      for (let i = 0; i < decalageDebut; i += 1) {
        html += '<div class="jour-planning jour-planning-vide"></div>';
      }

      for (let jour = 1; jour <= nombreJours; jour += 1) {
        const dateJour = new Date(anneeAffichee, moisAffiche, jour);
        dateJour.setHours(0, 0, 0, 0);

        const dateIso = formaterDateIsoLocale(dateJour);
        const donneesJour = planningParDate.get(dateIso) || creerJourFerme(dateIso, jour);

        const estPasse = dateJour < aujourdHui;
        const estAujourdhui = dateJour.getTime() === aujourdHui.getTime();
        const estOuvert = donneesJour.ouvert === true;
        const estCliquable = !estPasse && estOuvert;

        let classes = "jour-planning";

        if (estPasse) {
          classes += " jour-planning-passe";
        } else if (!estOuvert) {
          classes += " jour-planning-ferme";
        } else {
          classes += " jour-planning-actif";
        }

        if (estAujourdhui) {
          classes += " jour-planning-aujourdhui";
        }

        html += `
          <button
            class="${classes}"
            type="button"
            data-idparc="${echapperHtml(idParc)}"
            data-date="${dateIso}"
            ${estCliquable ? "" : "disabled"}
          >
            <span class="jour-planning-numero">
              ${jour}
            </span>

            <span class="jour-planning-plages">
              <span class="jour-planning-plage ${classeCouleurPlage(donneesJour.plages.plage1, estPasse)}"></span>
              <span class="jour-planning-plage ${classeCouleurPlage(donneesJour.plages.plage2, estPasse)}"></span>
              <span class="jour-planning-plage ${classeCouleurPlage(donneesJour.plages.plage3, estPasse)}"></span>
            </span>
          </button>
        `;
      }

      grillePlanning.innerHTML = html;
    }

    async function chargerPlanningParcMois(params) {
      const url =
        ENDPOINT_NOUVELLE_DATE_MEMBRE +
        "/planning-parc-mois?idparc=" + encodeURIComponent(params.idparc) +
        "&annee=" + encodeURIComponent(params.annee) +
        "&mois=" + encodeURIComponent(params.mois);

      const reponse = await fetch(url, {
        method: "GET",
        credentials: "include"
      });

      const data = await reponse.json().catch(() => null);

      if (reponse.status === 401) {
        throw new Error("Session membre expirée.");
      }

      if (!reponse.ok || !data || data.success !== true) {
        throw new Error(
          data && data.message
            ? data.message
            : "Impossible de charger le planning du parc."
        );
      }

      return data.planning || [];
    }

    function creerJourFerme(dateIso, jour) {
      return {
        date: dateIso,
        jour: jour,
        ouvert: false,
        plages: {
          plage1: { ouverte: false, couleur: "gris_clair" },
          plage2: { ouverte: false, couleur: "gris_clair" },
          plage3: { ouverte: false, couleur: "gris_clair" }
        }
      };
    }

    function classeCouleurPlage(plage, estPasse) {
      if (estPasse) {
        return "plage-couleur-gris-clair";
      }

      if (!plage || plage.ouverte !== true) {
        return "plage-couleur-gris-clair";
      }

      if (plage.couleur === "vert") {
        return "plage-couleur-vert";
      }

      if (plage.couleur === "orange") {
        return "plage-couleur-orange";
      }

      if (plage.couleur === "gris_fonce") {
        return "plage-couleur-gris-fonce";
      }

      return "plage-couleur-gris-clair";
    }

    function supprimerConfirmationDate() {
      const lightbox = document.getElementById("dialog-confirmation-date");

      if (lightbox) {
        lightbox.remove();
      }
    }

    function ouvrirConfirmationDate(dateIso) {
      masquerBoutonFermerParent();
      supprimerConfirmationDate();

      const lightbox = document.createElement("div");
      lightbox.id = "dialog-confirmation-date";
      lightbox.className = "dialog-overlay";

      lightbox.innerHTML = `
        <div class="dialog-box" role="dialog" aria-modal="true">

          <h2>
            Confirmer la date
          </h2>

          <p>
            Vous avez choisi le ${formaterDateFr(dateIso)}.
          </p>

          <div class="dialog-actions">

            <button class="button button-secondaire" type="button" data-action="annuler-confirmation-date">
              Annuler
            </button>

            <button class="button" type="button" data-action="valider-confirmation-date" data-date="${dateIso}">
              Continuer
            </button>

          </div>

        </div>
      `;

      document.body.appendChild(lightbox);
    }

    function fermerConfirmationDate() {
      supprimerConfirmationDate();
      afficherBoutonFermerParent();
    }

    function ouvrirPageHoraire(dateIso) {
      fermerConfirmationDate();

      window.location.href =
        window.SITE_BASE +
        "/PAGES/PRIVEES/MON%20PLANNING%20MEMBRE/horaire-parc-nouvelle-date.html" +
        "?idparc=" + encodeURIComponent(idParc) +
        "&nom=" + encodeURIComponent(nomParc) +
        "&dptmt=" + encodeURIComponent(departement) +
        "&date=" + encodeURIComponent(dateIso);
    }

    function formaterDateFr(dateIso) {
      const date = new Date(dateIso + "T12:00:00");

      return date.toLocaleDateString("fr-FR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function echapperHtml(valeur) {
      return String(valeur ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.addEventListener("click", (event) => {
      const boutonAnnulerDate = event.target.closest("[data-action='annuler-confirmation-date']");
      const boutonValiderDate = event.target.closest("[data-action='valider-confirmation-date']");
      const boutonJour = event.target.closest(".jour-planning[data-date]");

      if (boutonAnnulerDate) {
        fermerConfirmationDate();
        return;
      }

      if (boutonValiderDate) {
        ouvrirPageHoraire(boutonValiderDate.dataset.date);
        return;
      }

      if (boutonJour && !boutonJour.disabled) {
        ouvrirConfirmationDate(boutonJour.dataset.date);
        return;
      }
    });

    afficherMois();
  </script>

</body>
</html>
