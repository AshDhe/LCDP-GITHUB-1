<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Horaire d'arrivée - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/horaire-parc-nouvelle-date.css">'
    );
  </script>
</head>

<body>

  <main class="site-page horaire-parc-nouvelle-date-page">

    <section class="horaire-parc-entete">

      <h1 id="titre-horaire-parc">
        Votre heure d'arrivée
      </h1>

      <p id="infos-horaire-parc">
      </p>

    </section>

    <section class="horaire-parc-section" aria-label="Choix de l'heure d'arrivée">

      <div class="horaire-parc-grille" id="grille-horaires-parc">
      </div>

    </section>

  </main>

  <script>
    const ENDPOINT_FLUXM =
      "https://worker-fluxm-api.lacleduparc.fr";

    const ENDPOINT_NOUVELLE_DATE_MEMBRE =
      "https://nouvelle-date-membre-api.lacleduparc.fr";

    const params = new URLSearchParams(window.location.search);

    const idParc = params.get("idparc") || "";
    const nomParc = params.get("nom") || "";
    const departement = params.get("dptmt") || "";
    const dateChoisie = params.get("date") || "";

    const titreHoraire = document.getElementById("titre-horaire-parc");
    const infosHoraire = document.getElementById("infos-horaire-parc");
    const grilleHoraires = document.getElementById("grille-horaires-parc");

    let plagesJour = [];

    if (titreHoraire) {
      titreHoraire.textContent = dateChoisie
        ? "Votre heure d'arrivée le " + formaterDateFr(dateChoisie)
        : "Votre heure d'arrivée";
    }

    if (infosHoraire) {
      const details = [];

      if (nomParc) {
        details.push("Parc de " + nomParc);
      }

      if (departement) {
        details.push("Département " + departement);
      }

      infosHoraire.textContent = details.join(" · ");
    }

    initialiserHoraires();

    async function initialiserHoraires() {
      if (!grilleHoraires) return;

      grilleHoraires.innerHTML = `
        <p class="horaire-parc-message">
          Chargement des horaires disponibles...
        </p>
      `;

      try {
        const jourPlanning = await chargerPlanningJour();
        plagesJour = construirePlagesJour(jourPlanning);
        afficherHoraires();
      } catch (erreur) {
        grilleHoraires.innerHTML = `
          <p class="horaire-parc-message">
            ${echapperHtml(erreur.message)}
          </p>
        `;
      }
    }

    async function chargerPlanningJour() {
      if (!idParc || !dateChoisie) {
        throw new Error("Parc ou date manquant.");
      }

      const [annee, mois] = dateChoisie.split("-").map(Number);

      const url =
        ENDPOINT_NOUVELLE_DATE_MEMBRE +
        "/planning-parc-mois?idparc=" + encodeURIComponent(idParc) +
        "&annee=" + encodeURIComponent(annee) +
        "&mois=" + encodeURIComponent(mois);

      const reponse = await fetch(url, {
        method: "GET",
        credentials: "include"
      });

      const data = await reponse.json().catch(() => null);

      if (reponse.status === 401) {
        window.top.location.href =
          window.SITE_BASE +
          "/PAGES/PUBLIQUES/CONNEXION%20MEMBRE/connexion-membre.html?source=horaire-parc-nouvelle-date";
        return null;
      }

      if (!reponse.ok || !data || data.success !== true) {
        throw new Error(
          data && data.message
            ? data.message
            : "Impossible de charger les horaires du parc."
        );
      }

      const planning = data.planning || [];
      const jour = planning.find((item) => item.date === dateChoisie);

      if (!jour) {
        throw new Error("Aucun horaire disponible pour cette date.");
      }

      return jour;
    }

    function construirePlagesJour(jourPlanning) {
      if (!jourPlanning || !jourPlanning.plages) {
        return [];
      }

      const plages = [];

      ajouterPlageSiOuverte(plages, "plage1", jourPlanning.plages.plage1, {
        debut: "06:00",
        fin: "13:00"
      });

      ajouterPlageSiOuverte(plages, "plage2", jourPlanning.plages.plage2, {
        debut: "13:00",
        fin: "19:00"
      });

      ajouterPlageSiOuverte(plages, "plage3", jourPlanning.plages.plage3, {
        debut: "19:00",
        fin: "21:30"
      });

      return plages;
    }

    function ajouterPlageSiOuverte(plages, nomPlage, plage, defaut) {
      if (!plage || plage.ouverte !== true) {
        return;
      }

      plages.push({
        nom: nomPlage,
        debut: plage.debut || defaut.debut,
        fin: plage.fin || defaut.fin,
        couleur: normaliserCouleur(plage.couleur)
      });
    }

    function genererHeuresDisponibles() {
      const heures = [];

      for (let totalMinutes = 6 * 60; totalMinutes <= 21 * 60; totalMinutes += 30) {
        const heure = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;

        heures.push(
          String(heure).padStart(2, "0") + ":" + String(minutes).padStart(2, "0")
        );
      }

      return heures;
    }

    function afficherHoraires() {
      if (!grilleHoraires) return;

      const heuresDisponibles = genererHeuresDisponibles();

      const boutons = heuresDisponibles
        .map((heure) => {
          const plage = trouverPlagePourHeure(heure);

          if (!plage) {
            return "";
          }

          return `
            <button
              class="horaire-parc-bouton ${classeCouleurHoraire(plage.couleur)}"
              type="button"
              data-action="choisir-heure-arrivee"
              data-heure="${heure}"
              data-plagebookd="${plage.nom}"
            >
              ${formaterHeureAffichee(heure)}
            </button>
          `;
        })
        .join("");

      if (!boutons.trim()) {
        grilleHoraires.innerHTML = `
          <p class="horaire-parc-message">
            Aucun horaire d'arrivée n'est disponible pour cette date.
          </p>
        `;
        return;
      }

      grilleHoraires.innerHTML = boutons;
    }

    function trouverPlagePourHeure(heure) {
      const totalMinutes = convertirHeureEnMinutes(heure);

      return plagesJour.find((plage) => {
        const debut = convertirHeureEnMinutes(plage.debut);
        const fin = convertirHeureEnMinutes(plage.fin);

        return totalMinutes >= debut && totalMinutes < fin;
      }) || null;
    }

    function convertirHeureEnMinutes(heure) {
      const [heures, minutes] = String(heure || "00:00").split(":").map(Number);

      if (!Number.isFinite(heures) || !Number.isFinite(minutes)) {
        return 0;
      }

      return heures * 60 + minutes;
    }

    function normaliserCouleur(couleur) {
      if (couleur === "vert") {
        return "vert";
      }

      if (couleur === "orange") {
        return "orange";
      }

      if (couleur === "gris_fonce") {
        return "gris_fonce";
      }

      if (couleur === "fonce") {
        return "gris_fonce";
      }

      return "gris_clair";
    }

    function classeCouleurHoraire(couleur) {
      if (couleur === "vert") {
        return "horaire-couleur-vert";
      }

      if (couleur === "orange") {
        return "horaire-couleur-orange";
      }

      if (couleur === "gris_fonce") {
        return "horaire-couleur-gris-fonce";
      }

      return "horaire-couleur-gris-clair";
    }

    function envoyerMessageParent(action) {
      window.parent.postMessage(
        {
          source: "lcdp-planning-parc-nouvelle-date",
          action: action
        },
        "*"
      );
    }

    function masquerBoutonFermerParent() {
      envoyerMessageParent("masquer-fermer-planning");
    }

    function afficherBoutonFermerParent() {
      envoyerMessageParent("afficher-fermer-planning");
    }

    function supprimerConfirmationHeure() {
      const lightbox = document.getElementById("dialog-confirmation-heure");

      if (lightbox) {
        lightbox.remove();
      }
    }

    function ouvrirConfirmationHeure(heure, plagebookd) {
      masquerBoutonFermerParent();
      supprimerConfirmationHeure();

      const lightbox = document.createElement("div");
      lightbox.id = "dialog-confirmation-heure";
      lightbox.className = "dialog-overlay";

      lightbox.innerHTML = `
        <div class="dialog-box" role="dialog" aria-modal="true">

          <h2>
            Confirmer l'heure d'arrivée
          </h2>

          <p>
            Vous avez choisi le ${formaterDateFr(dateChoisie)} à ${formaterHeureAffichee(heure)}.
          </p>

          <div class="dialog-actions">

            <button class="button button-secondaire" type="button" data-action="annuler-confirmation-heure">
              Annuler
            </button>

            <button
              class="button"
              type="button"
              data-action="valider-confirmation-heure"
              data-heure="${heure}"
              data-plagebookd="${plagebookd}"
            >
              Confirmer
            </button>

          </div>

        </div>
      `;

      document.body.appendChild(lightbox);
    }

    function fermerConfirmationHeure() {
      supprimerConfirmationHeure();
      afficherBoutonFermerParent();
    }

    function ouvrirConfirmationEnregistrement() {
      supprimerConfirmationHeure();
      masquerBoutonFermerParent();

      const lightbox = document.createElement("div");
      lightbox.id = "dialog-confirmation-enregistrement";
      lightbox.className = "dialog-overlay";

      lightbox.innerHTML = `
        <div class="dialog-box" role="dialog" aria-modal="true">

          <h2>
            Nouvelle date enregistrée
          </h2>

          <p>
            Votre nouvelle date a bien été enregistrée.
          </p>

          <div class="dialog-actions">

            <button class="button" type="button" data-action="retour-mon-planning">
              OK
            </button>

          </div>

        </div>
      `;

      document.body.appendChild(lightbox);
    }

    function construireDateBookd(dateIso, heure) {
      const dateLocale = new Date(dateIso + "T" + heure + ":00");

      return dateLocale.toISOString();
    }

    async function enregistrerReservation(heure, plagebookd) {
      const datebookd = construireDateBookd(dateChoisie, heure);

      const reponse = await fetch(ENDPOINT_FLUXM + "/creer-reservation", {
        method: "POST",
        credentials: "include",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          idparc: idParc,
          datebookd: datebookd,
          plagebookd: plagebookd
        })
      });

      const data = await reponse.json().catch(() => null);

      if (reponse.status === 401) {
        window.top.location.href =
          window.SITE_BASE +
          "/PAGES/PUBLIQUES/CONNEXION%20MEMBRE/connexion-membre.html?source=horaire-parc-nouvelle-date";
        return;
      }

      if (!reponse.ok || !data || data.success !== true) {
        throw new Error(
          data && data.message
            ? data.message
            : "Impossible d'enregistrer la réservation."
        );
      }

      return data.reservation;
    }

    function formaterDateFr(dateIso) {
      if (!dateIso) return "";

      const date = new Date(dateIso + "T12:00:00");

      return date.toLocaleDateString("fr-FR", {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
      });
    }

    function formaterHeureAffichee(heure) {
      return heure.replace(":", "h");
    }

    function allerMonPlanning() {
      window.top.location.href =
        window.SITE_BASE +
        "/PAGES/PRIVEES/MON%20PLANNING%20MEMBRE/mon-planning-membre.html";
    }

    function echapperHtml(valeur) {
      return String(valeur ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.addEventListener("click", async (event) => {
      const boutonHeure = event.target.closest("[data-action='choisir-heure-arrivee']");
      const boutonAnnuler = event.target.closest("[data-action='annuler-confirmation-heure']");
      const boutonValider = event.target.closest("[data-action='valider-confirmation-heure']");
      const boutonRetourPlanning = event.target.closest("[data-action='retour-mon-planning']");

      if (boutonHeure) {
        ouvrirConfirmationHeure(
          boutonHeure.dataset.heure,
          boutonHeure.dataset.plagebookd
        );
        return;
      }

      if (boutonAnnuler) {
        fermerConfirmationHeure();
        return;
      }

      if (boutonRetourPlanning) {
        allerMonPlanning();
        return;
      }

      if (boutonValider) {
        const heure = boutonValider.dataset.heure;
        const plagebookd = boutonValider.dataset.plagebookd;

        boutonValider.disabled = true;
        boutonValider.textContent = "Enregistrement...";

        try {
          await enregistrerReservation(heure, plagebookd);
          ouvrirConfirmationEnregistrement();
        } catch (erreur) {
          boutonValider.disabled = false;
          boutonValider.textContent = "Confirmer";
          alert(erreur.message);
        }

        return;
      }
    });
  </script>

</body>
</html>
