<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Nouvelle date membre - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/mes-informations-membre.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/nouvelle-date-membre.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/carte-parc-membre.css">'
    );
  </script>
</head>

<body>

  <div id="boite-dialogue-container"></div>
  <div id="lightbox-information-container"></div>

<main class="site-page">

<section class="section-actions-nouvelle-date" aria-label="Actions nouvelle date">

  <button class="button" type="button" id="bouton-demander-ia">
    Passer directement par l'IA
  </button>

  <a class="micro-action" id="lien-fermer-nouvelle-date" href="/PAGES/PRIVEES/MON%20PLANNING%20MEMBRE/mon-planning-membre.html">
    Fermer
  </a>

</section>

  <section class="section-recontact" aria-label="Choix du parc">

    <table class="table" id="table-nouvelle-date-membre" aria-label="Liste des parcs du département">

      <thead>
        <tr>
          <th>
            <span id="titre-departement-membre">Votre département</span>
          </th>

          <th>
<button class="micro-action" type="button" id="bouton-modifier-departement">
  Autour de moi
</button>
          </th>
        </tr>
      </thead>

      <tbody id="liste-parcs-membre">

        <tr>
          <td colspan="2">
            Chargement des parcs de votre département...
          </td>
        </tr>

        <!--
          Les cartes parcs seront injectées ici par nouvelle-date-membre.js.

          Structure prévue pour une carte :

          <tr>
            <td colspan="2">

              <article class="carte-parc-membre">

                <h3>
                  Parc de Ménars
                </h3>

                <p>
                  Département : 41
                </p>

                <p>
                  Parc accessible aux membres La Clé du Parc.
                </p>

                <button class="micro-action" type="button">
                  Voir les disponibilités
                </button>

              </article>

            </td>
          </tr>
        -->

      </tbody>

    </table>

  </section>

</main>

  <script>
    document.querySelectorAll("a[href^='/']").forEach((lien) => {
      lien.setAttribute("href", window.SITE_BASE + lien.getAttribute("href"));
    });

    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/boite-dialogue.js")
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js"))
      .then(() => chargerScript(window.SITE_BASE + "/PAGES/PRIVEES/MON%20PLANNING%20MEMBRE/nouvelle-date-membre.js"));
  </script>

</body>
</html>
