<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mon compte membre - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );
  </script>
</head>

<body>

  <div id="burger-menu-container"></div>
  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">

      <h1 class="site-title">
        Mon compte membre
      </h1>

      <h2 class="site-subtitle">
        Retrouvez vos informations de compte.
      </h2>

    </section>

    <section class="exit-menu-bas" aria-label="Rubriques du compte membre">

      <h2>
        <a href="mes-informations-membre.html" id="lien-informations-compte">
          Mes informations de compte (membre)
        </a>
      </h2>

      <h2>
        <a href="mes-invites.html" id="lien-invites">
          Mes invités
        </a>
      </h2>

      <h2>
        <a href="mon-abonnement.html" id="lien-abonnement">
          Mon abonnement
        </a>
      </h2>

      <h2>
        <a href="mon-planning-membre.html" id="lien-planning-membre">
          Mon planning membre
        </a>
      </h2>

      <h2>
        <a href="mes-points-membre.html" id="lien-points-membre">
          Mes points d'activité (membre)
        </a>
      </h2>

      <h2>
        <a href="contact-membres.html" id="lien-contact-membres">
          Contacter le support membres La Clé du Parc
        </a>
      </h2>

    </section>

  </main>

  <div id="footer-container"></div>

  <script>
    document.querySelectorAll("a[href^='/']").forEach((lien) => {
      lien.setAttribute("href", window.SITE_BASE + lien.getAttribute("href"));
    });

    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js")
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/burger-menu.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/footer.js"))
      .then(() => chargerScript(window.SITE_BASE + "/PAGES/PRIVEES/MON%20COMPTE%20MEMBRE/mon-compte-membre.js"));
  </script>

</body>
</html>
