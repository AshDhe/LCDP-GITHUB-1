<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mes invités membres - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/mes-informations-membre.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/mes-invites-membre.css">'
    );
  </script>
</head>

<body>

  <div id="burger-menu-container"></div>
  <div id="boite-dialogue-container"></div>
  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">

      <h1 class="site-title">
        Mes invités
      </h1>

      <h2 class="site-subtitle">
        Invitez les membres que vous parrainez.
      </h2>

    </section>

    <section class="section-recontact" aria-label="Liste des invités membre">

      <table class="table table-invites-membre" id="table-invites-membre" aria-label="Mes invités membre">

        <thead>
          <tr>
            <th colspan="3" id="titre-table-invites-membre">
              Mes invités
            </th>

            <th>
              <button class="button" type="button" id="bouton-inviter-membre">
                Inviter
              </button>
            </th>
          </tr>
        </thead>

        <tbody id="liste-mes-invites-membre">

          <tr>
            <td colspan="4" id="message-mes-invites-membre">
              Chargement de vos invités...
            </td>
          </tr>

        </tbody>

      </table>

    </section>

    <section class="exit-menu-bas" aria-label="Retour au compte membre">
      <h2>
        <a href="/PAGES/PRIVEES/MON%20COMPTE%20MEMBRE/mon-compte-membre.html">
          Retour à mon compte membre
        </a>
      </h2>
    </section>

  </main>

  <div id="footer-container"></div>

  <script>
    document.querySelectorAll("a[href^='/']").forEach((lien) => {
      lien.setAttribute("href", window.SITE_BASE + lien.getAttribute("href"));
    });

    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/boite-dialogue.js")
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/burger-menu.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/footer.js"))
      .then(() => chargerScript(window.SITE_BASE + "/PAGES/PRIVEES/MES%20INVITES%20MEMBRE/mes-invites-membre.js"));
  </script>

</body>
</html>
