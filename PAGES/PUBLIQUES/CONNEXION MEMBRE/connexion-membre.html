<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Connexion membre - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/formulaires.css">'
    );
  </script>
</head>

<body>

  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">

      <h1 class="site-title">
        Connexion membre
      </h1>

      <h2 class="site-subtitle">
        Accéder à mon compte membre.
      </h2>

      <div class="formulaire-page">

        <form
          id="formulaire-connexion-membre"
          class="formulaire-inscription"
          novalidate
          onsubmit="return false;"
        >

          <div class="formulaire-champ">
            <label for="emailmembre">
              Identifiant du compte (email)
            </label>

            <input
              type="email"
              id="emailmembre"
              name="emailmembre"
              autocomplete="username"
              required
            />
          </div>

          <div class="formulaire-champ">
            <label for="mdpmembre">
              Mot de passe du compte
            </label>

            <input
              type="password"
              id="mdpmembre"
              name="mdpmembre"
              autocomplete="current-password"
              required
            />

            <label class="checkbox-ligne" for="afficher-mdp-membre">
              <input
                type="checkbox"
                id="afficher-mdp-membre"
              />
              <span>Afficher le mot de passe</span>
            </label>
          </div>

          <div class="formulaire-actions">
            <button
              type="button"
              id="bouton-valider-formulaire"
            >
              Connexion
            </button>
          </div>

        </form>

      </div>

      <div class="section-recontact">
        <p class="formulaire-note">
          <a
            id="lien-mot-de-passe-oublie"
            href="#"
          >
            Mot de passe oublié ?
          </a>
        </p>
      </div>

    </section>

  </main>

 <script>

  document.getElementById("lien-mot-de-passe-oublie").href =
    window.SITE_BASE + "/PAGES/PUBLIQUES/MDP%20PERDU/mdp-perdu.html";

  function chargerScript(src) {
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = src;
      script.onload = resolve;
      script.onerror = () => reject(new Error("Erreur chargement : " + src));
      document.body.appendChild(script);
    });
  }

  chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js")
    .catch((erreur) => {
      console.warn(erreur.message);
    });

  chargerScript(window.SITE_BASE + "/PAGES/PUBLIQUES/CONNEXION%20MEMBRE/connexion-membre.js")
    .catch((erreur) => {
      console.error(erreur.message);
      alert("Le fichier de connexion ne s’est pas chargé.");
    });

  </script>

</body>
</html>
