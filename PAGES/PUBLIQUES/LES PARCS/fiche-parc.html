<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Les parcs - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";
    document.write('<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">');
  </script>
</head>

<body>

  <div id="burger-menu-container"></div>
  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">
      <h1 class="site-title">Les parcs</h1>

      <h2 class="site-subtitle">
        Présentation des parcs réseau de La Clé du Parc.
      </h2>

      <p>
        Le contenu de cette page sera complété ultérieurement.
      </p>
    </section>

  </main>

  <div id="footer-container"></div>

  <script>
    document.querySelectorAll("a[href^='/']").forEach((lien) => {
      lien.setAttribute("href", window.SITE_BASE + lien.getAttribute("href"));
    });

    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js")
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/burger-menu.js"))
      .then(() => chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/footer.js"));
  </script>

</body>
</html>
