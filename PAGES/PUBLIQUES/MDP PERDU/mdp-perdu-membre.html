<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mot de passe perdu membre - La Clé du Parc</title>

  <script>
    window.SITE_BASE = location.hostname.includes("github.io") ? "/LCDP-GITHUB-1" : "";

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/bases.css">'
    );

    document.write(
      '<link rel="stylesheet" href="' + window.SITE_BASE + '/OBJETS/CSS/formulaires.css">'
    );
  </script>
</head>

<body>

  <div id="lightbox-information-container"></div>

  <main class="site-page">

    <section class="landing-text hero-text">

      <h1 class="site-title">
        Mot de passe perdu membre
      </h1>

      <h2 class="site-subtitle">
        Recevoir un lien pour définir ou redéfinir votre mot de passe.
      </h2>

      <div class="formulaire-page">

        <form
          id="formulaire-mdp-perdu-membre"
          class="formulaire-inscription"
          novalidate
          onsubmit="return false;"
        >

          <div class="formulaire-champ">
            <label for="emailmembre">
              Votre email de compte membre
            </label>

            <input
              type="email"
              id="emailmembre"
              name="emailmembre"
              autocomplete="email"
              required
            />
          </div>

          <div class="formulaire-actions">
            <button
              type="button"
              id="bouton-valider-formulaire"
            >
              Envoyer
            </button>
          </div>

        </form>

      </div>

    </section>

  </main>

  <script>
    function chargerScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = () => reject(new Error("Erreur chargement : " + src));
        document.body.appendChild(script);
      });
    }

    chargerScript(window.SITE_BASE + "/OBJETS/BLOCS/lightbox-information.js")
      .catch((erreur) => {
        console.warn(erreur.message);
      });

    chargerScript(window.SITE_BASE + "/PAGES/PUBLIQUES/MDP%20PERDU/mdp-perdu-membre.js")
      .catch((erreur) => {
        console.error(erreur.message);
        alert("Le fichier de mot de passe perdu ne s’est pas chargé.");
      });
  </script>

</body>
</html>
