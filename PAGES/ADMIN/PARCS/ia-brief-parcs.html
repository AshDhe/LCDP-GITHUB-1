<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Brief Parcs</title>
</head>

<body>

<main>
  <h1>IA Brief Parcs</h1>

  <section id="section-selection-parc">
    <h2>1. Sélection du parc</h2>

    <form id="form-selection-parc">
      <div>
        <label for="nom-parc">Nom du parc</label>
        <input type="text" id="nom-parc" autocomplete="off" required>
        <div id="suggestions-parcs"></div>
      </div>

      <div>
        <label for="dptmt-parc">Département</label>
        <input type="text" id="dptmt-parc" required>
      </div>

      <button type="submit">Valider le parc</button>
    </form>

    <p id="message-selection-parc"></p>
  </section>

  <section id="section-brief-ia" hidden>
    <h2>2. Brief IA du parc</h2>

    <p>Parc sélectionné :</p>
    <p id="parc-selectionne"></p>

    <form id="form-brief-ia">
      <label for="texte-brief">Brief administrateur</label>
      <textarea id="texte-brief" rows="16" cols="100" required></textarea>

      <button type="submit">Lancer le brief IA</button>
    </form>

    <p id="message-brief-ia"></p>
  </section>

  <section id="section-validation-json" hidden>
    <h2>3. Validation du JSON</h2>

    <h3>Résumé lisible</h3>
    <div id="resume-json-brief"></div>

    <h3>JSON technique</h3>
    <pre id="resultat-json-brief"></pre>

    <button id="btn-corriger-brief">Corriger le brief</button>
    <button id="btn-valider-json">Valider le JSON</button>

    <p id="message-validation-json"></p>
  </section>

</main>

<script src="ia-brief-parcs.js"></script>

</body>
</html>
