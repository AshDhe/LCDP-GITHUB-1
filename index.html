<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
    }

    .carousel {
      position: relative;
      width: 100%;
      max-width: 100%;
      aspect-ratio: 16 / 9;
      margin: 0;
      overflow: hidden;
      border-radius: 0;
    }

    .carousel-track {
  position: relative;
  width: 100%;
  height: 100%;
}

.carousel-track img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center center;
  display: block;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.carousel-track img.active {
  opacity: 1;
  z-index: 1;
}

    .carousel-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 999;
      width: 44px;
      height: 44px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      color: black;
      font-size: 34px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .prev {
      left: 18px;
    }

    .next {
      right: 18px;
    }

    .carousel-dots {
      position: absolute;
      bottom: 35px;
      left: 0;
      right: 0;
      z-index: 998;
      display: flex;
      justify-content: center;
      gap: 8px;
    }

    .carousel-dots button {
      width: 9px;
      height: 9px;
      padding: 0;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.65);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .carousel-dots button.active {
      background: white;
    }

    @media (max-width: 600px) {
      .carousel {
        aspect-ratio: 16 / 9;
      }

      .carousel-btn {
        width: 34px;
        height: 34px;
        font-size: 28px;
      }

      .prev {
        left: 10px;
      }

      .next {
        right: 10px;
      }

      .carousel-dots {
        bottom: 35px;
      }

      .carousel-dots button {
        width: 8px;
        height: 8px;
      }
    }
  </style>
</head>

<body>

  <div class="carousel">
    <button class="carousel-btn prev" aria-label="Image précédente">‹</button>

    <div class="carousel-track">
      <img src="images/IMAG_1.jpg" alt="">
      <img src="images/IMAG_2.jpg" alt="">
      <img src="images/IMAG_3.jpg" alt="">
      <img src="images/IMAG_4.jpg" alt="">
      <img src="images/IMAG_5.jpg" alt="">
      <img src="images/IMAG_6.jpg" alt="">
      <img src="images/IMAG_7.jpg" alt="">
    </div>

    <button class="carousel-btn next" aria-label="Image suivante">›</button>

    <div class="carousel-dots"></div>
  </div>

  <script>
  const slides = Array.from(document.querySelectorAll(".carousel-track img"));
  const nextButton = document.querySelector(".next");
  const prevButton = document.querySelector(".prev");
  const dotsContainer = document.querySelector(".carousel-dots");

  let currentIndex = 0;
  let autoplay;

  if (slides.length === 0) {
    console.error("Aucune image trouvée dans le carrousel");
  } else {
    slides.forEach((slide, index) => {
      if (index === 0) {
        slide.classList.add("active");
      }

      const dot = document.createElement("button");

      if (index === 0) {
        dot.classList.add("active");
      }

      dot.addEventListener("click", () => {
        goToSlide(index);
        restartAutoplay();
      });

      dotsContainer.appendChild(dot);
    });

    const dots = Array.from(dotsContainer.children);

    function goToSlide(index) {
      slides[currentIndex].classList.remove("active");
      dots[currentIndex].classList.remove("active");

      currentIndex = index;

      slides[currentIndex].classList.add("active");
      dots[currentIndex].classList.add("active");
    }

    function nextSlide() {
      const nextIndex = (currentIndex + 1) % slides.length;
      goToSlide(nextIndex);
    }

    function prevSlide() {
      const prevIndex = (currentIndex - 1 + slides.length) % slides.length;
      goToSlide(prevIndex);
    }

    function startAutoplay() {
      autoplay = setInterval(nextSlide, 6000);
    }

    function restartAutoplay() {
      clearInterval(autoplay);
      startAutoplay();
    }

    nextButton.addEventListener("click", () => {
      nextSlide();
      restartAutoplay();
    });

    prevButton.addEventListener("click", () => {
      prevSlide();
      restartAutoplay();
    });

    startAutoplay();
  }
</script>
  </script>

</body>
</html>
